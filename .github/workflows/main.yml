name: BuildNuGetAndPublish

on:
  push:
    tags:
      - '*'
jobs:
  build:

    env:
      BUILD_CONFIG: 'Release'
      SOLUTION: 'BexioApiNet.sln'

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Get Build Version
        run: |
          Import-Module .\build\GetBuildVersion.psm1
          Write-Host $Env:GITHUB_REF
          $version = GetBuildVersion -VersionString $Env:GITHUB_REF
          echo "BUILD_VERSION=$version" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf-8 -Append
        shell: pwsh

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x

      - name: Restore dependencies
        run: dotnet restore $SOLUTION

      - name: Build
        run: dotnet build $SOLUTION --configuration $BUILD_CONFIG -p:Version=$BUILD_VERSION --no-restore

      - name: Unit Tests
        run: dotnet test tests/BexioApiNet.UnitTests/BexioApiNet.UnitTests.csproj --configuration $BUILD_CONFIG --no-build

      - name: Integration Tests
        run: dotnet test tests/BexioApiNet.IntegrationTests/BexioApiNet.IntegrationTests.csproj --configuration $BUILD_CONFIG --no-build

      - name: Publish
        run: dotnet nuget push '**/*.nupkg' --source 'https://api.nuget.org/v3/index.json' --api-key ${{secrets.NUGET_API_KEY}}
